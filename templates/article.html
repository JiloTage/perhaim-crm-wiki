<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - Auto-Wiki</title>
  <link rel="stylesheet" href="../assets/css/wiki.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad: true, theme: 'neutral'});</script>
</head>
<body>
<div class="wiki-wrapper">
  <header class="wiki-header">
    <a href="../index.html" class="site-title">Auto-Wiki</a>
    <nav>
      <a href="../index.html">トップ</a>
      <a href="../index.html#article-list">記事一覧</a>
      <a href="../index.html#graph">サイトグラフ</a>
    </nav>
  </header>

  <div class="breadcrumb">
    <a href="../index.html">Auto-Wiki</a> &gt; {{TITLE}}
  </div>

  <div class="wiki-content">
    <main class="wiki-main">
      <h1 class="article-title">{{TITLE}}</h1>
      <div class="article-meta">最終更新: {{UPDATED_AT}}</div>
      <div class="article-summary">{{SUMMARY}}</div>

      {{CONTENT}}
    </main>

    <aside class="wiki-sidebar">
      <div class="toc">
        <div class="toc-title">目次</div>
        <ul class="toc-list">
          {{TOC}}
        </ul>
      </div>

      <div class="related-articles">
        <div class="related-title">関連記事</div>
        <ul class="related-list">
          {{RELATED_ARTICLES}}
        </ul>
      </div>
    </aside>
  </div>

  <footer class="wiki-footer">
    <div class="footer-links">
      <h4>リンク先</h4>
      <ul>{{LINKS_TO}}</ul>
      <h4>被リンク</h4>
      <ul>{{LINKED_FROM}}</ul>
    </div>
    <p style="margin-top:12px;">Auto-Wiki で自動生成</p>
  </footer>
</div>
</body>
</html>
